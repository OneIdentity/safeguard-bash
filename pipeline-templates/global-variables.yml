variables:
  - name: version
    value: "8.2"
  - name: isTagBuild
    value: ${{ startsWith(variables['Build.SourceBranch'], 'refs/tags/') }}
  - name: isPrerelease
    value: ${{ not(startsWith(variables['Build.SourceBranch'], 'refs/tags/')) }}
  - name: shouldPublishDocker
    value: $[ startsWith(variables['Build.SourceBranch'], 'refs/tags/') ]
